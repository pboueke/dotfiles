---
# backup.yml — Copy current dotfiles from the system into this repository.
#
# Requirements:
#   sudo apt install ansible rsync
#
# Usage (run from anywhere inside the repo):
#   ansible-playbook ansible/backup.yml
#
# To also commit all changes after syncing:
#   ansible-playbook ansible/backup.yml -e auto_commit=true

- name: Backup dotfiles from system to repository
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    # Resolved to the repo root regardless of where the playbook is invoked from
    repo_dir: "{{ playbook_dir | dirname }}"
    home: "{{ ansible_env.HOME }}"

    # Set to true (or pass -e auto_commit=true) to git-commit after syncing
    auto_commit: false

    # ── Single files: source on system → destination in repo ──────────────────
    dotfiles_files:
      - src: "{{ home }}/.zshrc"
        dest: "{{ repo_dir }}/zsh/.zshrc"
      - src: "{{ home }}/.gitconfig"
        dest: "{{ repo_dir }}/git/.gitconfig"
      - src: "{{ home }}/.config/starship.toml"
        dest: "{{ repo_dir }}/starship/starship.toml"

    # ── Directories: rsync'd with deletion of removed files ───────────────────
    dotfiles_dirs:
      - src: "{{ home }}/.config/nvim"
        dest: "{{ repo_dir }}/nvim"
      - src: "{{ home }}/.config/sway"
        dest: "{{ repo_dir }}/sway"
      - src: "{{ home }}/.config/waybar"
        dest: "{{ repo_dir }}/waybar"
      - src: "{{ home }}/.config/wofi"
        dest: "{{ repo_dir }}/wofi"
      - src: "{{ home }}/.config/foot"
        dest: "{{ repo_dir }}/foot"

  tasks:

    # ── Single files ──────────────────────────────────────────────────────────

    - name: Ensure parent directories exist for single-file configs
      ansible.builtin.file:
        path: "{{ item.dest | dirname }}"
        state: directory
        mode: "0755"
      loop: "{{ dotfiles_files }}"

    - name: Copy single-file configs
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: preserve
      loop: "{{ dotfiles_files }}"
      # Skip silently when a source file doesn't exist on this machine
      failed_when: false

    # ── Directories ───────────────────────────────────────────────────────────

    - name: Ensure destination directories exist
      ansible.builtin.file:
        path: "{{ item.dest }}"
        state: directory
        mode: "0755"
      loop: "{{ dotfiles_dirs }}"

    - name: Sync directory configs with rsync
      ansible.builtin.shell:
        # -a  : archive (recursive, preserve permissions/timestamps/symlinks)
        # --delete          : remove files in dest that no longer exist in src
        # --itemize-changes : print one line per changed file (used in summary)
        # --exclude='.git'  : never copy .git internals
        cmd: >-
          rsync -a --delete --itemize-changes
          --exclude='.git'
          '{{ item.src }}/'
          '{{ item.dest }}/'
      loop: "{{ dotfiles_dirs }}"
      register: rsync_results
      # rsync exits 0 whether or not anything changed; always mark as potentially
      # changed so Ansible doesn't silently skip the summary step below
      changed_when: true

    - name: Show sync summary
      ansible.builtin.debug:
        msg: >-
          {{ item.item.src | basename }}:
          {% if item.stdout_lines | length > 0 %}
          {{ item.stdout_lines | length }} file(s) updated —
          {{ item.stdout_lines | join(', ') }}
          {% else %}
          up to date
          {% endif %}
      loop: "{{ rsync_results.results }}"
      loop_control:
        label: "{{ item.item.src | basename }}"

    # ── Optional git commit ───────────────────────────────────────────────────

    - name: Check for uncommitted changes
      ansible.builtin.command:
        cmd: git status --porcelain
        chdir: "{{ repo_dir }}"
      register: git_status
      changed_when: false
      when: auto_commit | bool

    - name: Stage all changes
      ansible.builtin.command:
        cmd: git add -A
        chdir: "{{ repo_dir }}"
      when: auto_commit | bool and git_status.stdout != ""
      changed_when: true

    - name: Commit backup
      ansible.builtin.command:
        cmd: >-
          git commit -m
          "backup: {{ ansible_date_time.date }} {{ ansible_date_time.time }}"
        chdir: "{{ repo_dir }}"
      when: auto_commit | bool and git_status.stdout != ""
      changed_when: true

    - name: Nothing to commit
      ansible.builtin.debug:
        msg: "Working tree is clean — nothing to commit."
      when: auto_commit | bool and git_status.stdout == ""
